<div class="list-container">
  <div class="page-header">
    <h1>Users</h1>
    <button mat-raised-button color="primary"
            *hasPermission="permissions.Users.Create"
            (click)="openCreateDialog()">
      <mat-icon>person_add</mat-icon>
      New User
    </button>
  </div>

  <div class="table-container mat-elevation-z8">
    @if (loading()) {
      <div class="loading-shade">
        <mat-spinner></mat-spinner>
      </div>
    }

    <table mat-table [dataSource]="data()" matSort (matSortChange)="onSortChange($event)">
      <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
        <td mat-cell *matCellDef="let row">
          <a [routerLink]="['/users', row.id]" class="user-link">{{ row.fullName }}</a>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
        <td mat-cell *matCellDef="let row"> {{ row.email }} </td>
      </ng-container>

      <ng-container matColumnDef="roleName">
        <th mat-header-cell *matHeaderCellDef> Role </th>
        <td mat-cell *matCellDef="let row"> {{ row.roleName }} </td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let row">
          <span class="status-chip" [class.active]="row.isActive" [class.inactive]="!row.isActive">
            {{ row.isActive ? 'Active' : 'Inactive' }}
          </span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No users found.</td>
      </tr>
    </table>

    <mat-paginator [length]="totalCount()"
                   [pageSize]="pageSize()"
                   [pageIndex]="pageIndex()"
                   [pageSizeOptions]="[5, 10, 25, 100]"
                   (page)="onPageChange($event)"
                   aria-label="Select page">
    </mat-paginator>
  </div>
</div>
