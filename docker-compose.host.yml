# Workaround for hosts where Docker bridge/veth networking fails
# ("operation not supported" creating veth pairs).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.host.yml up -d --build
#
# All services share the host network namespace and talk via 127.0.0.1.

services:
  sql-server:
    network_mode: host
    # ports ignored with host networking; SQL listens on host :1433

  redis:
    network_mode: host

  seq:
    network_mode: host

  tracer-api:
    build:
      context: .
      dockerfile: src/Tracer.Api/Dockerfile
      network: host
    network_mode: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:5001
      - ConnectionStrings__DefaultConnection=Server=127.0.0.1,1433;Database=TracerDb;User Id=sa;Password=Your_Password123;TrustServerCertificate=True;
      - ConnectionStrings__Redis=127.0.0.1:6379
      - Serilog__WriteTo__0__Args__configure__0__Args__serverUrl=http://127.0.0.1:5341
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5001/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s

  tracer-web:
    build:
      context: src/Tracer.Web
      dockerfile: Dockerfile
      network: host
    network_mode: host
    volumes:
      - ./src/Tracer.Web/nginx.host.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:4200/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
