<div class="list-container">
  <div class="actions-bar">
    <button mat-raised-button color="primary" 
            *hasPermission="permissions.Locations.Create" 
            (click)="openCreateDialog()">
      <mat-icon>add</mat-icon>
      New Location
    </button>
  </div>

  <div class="table-container mat-elevation-z8">
    @if (loading()) {
      <div class="loading-shade">
        <mat-spinner></mat-spinner>
      </div>
    }

    <table mat-table [dataSource]="data()" matSort (matSortChange)="onSortChange($event)">
      
      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
        <td mat-cell *matCellDef="let row"> {{row.name}} </td>
      </ng-container>

      <!-- City Column -->
      <ng-container matColumnDef="city">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> City </th>
        <td mat-cell *matCellDef="let row"> {{row.city}} </td>
      </ng-container>

      <!-- Country Column -->
      <ng-container matColumnDef="country">
        <th mat-header-cell *matHeaderCellDef> Country </th>
        <td mat-cell *matCellDef="let row"> {{row.country}} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="action-column"></th>
        <td mat-cell *matCellDef="let row" class="action-column">
          <button mat-icon-button color="primary" *hasPermission="permissions.Locations.Update" (click)="openEditDialog(row)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" *hasPermission="permissions.Locations.Delete" (click)="deleteLocation(row)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No data matching the filter.</td>
      </tr>
    </table>

    <mat-paginator [length]="totalCount()"
                   [pageSize]="pageSize()"
                   [pageIndex]="pageIndex()"
                   [pageSizeOptions]="[5, 10, 25, 100]"
                   (page)="onPageChange($event)"
                   aria-label="Select page">
    </mat-paginator>
  </div>
</div>
