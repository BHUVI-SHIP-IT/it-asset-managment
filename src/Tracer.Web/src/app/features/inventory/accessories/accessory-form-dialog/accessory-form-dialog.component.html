<h2 mat-dialog-title>{{ isEditMode ? 'Edit Accessory' : 'Create Accessory' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Accessory Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter accessory name" required>
      <mat-error *ngIf="form.get('name')?.hasError('required')">
        Name is required
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width mt-3">
      <mat-label>Total Quantity</mat-label>
      <input matInput type="number" formControlName="totalQuantity" placeholder="0" required min="0">
      <mat-error *ngIf="form.get('totalQuantity')?.hasError('required')">
        Total Quantity is required
      </mat-error>
      <mat-error *ngIf="form.get('totalQuantity')?.hasError('min')">
        Total Quantity cannot be negative
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width mt-3">
      <mat-label>Purchase Cost</mat-label>
      <input matInput type="number" formControlName="purchaseCost" placeholder="0.00" required min="0">
      <mat-error *ngIf="form.get('purchaseCost')?.hasError('required')">
        Purchase Cost is required
      </mat-error>
      <mat-error *ngIf="form.get('purchaseCost')?.hasError('min')">
        Purchase Cost cannot be negative
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="onSubmit()">
    {{ isEditMode ? 'Update' : 'Create' }}
  </button>
</mat-dialog-actions>
