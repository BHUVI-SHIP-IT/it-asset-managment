<div class="table-container mat-elevation-z8">
  <div class="table-header">
    <h2>Components</h2>
    <button mat-raised-button color="primary" (click)="openCreateDialog()" *hasPermission="permissions.Components.Create">
      <mat-icon>add</mat-icon>
      Create Component
    </button>
  </div>

  <div class="loading-shade" *ngIf="loading()">
    <mat-spinner></mat-spinner>
  </div>

  <table mat-table [dataSource]="data()" matSort (matSortChange)="onSortChange($event)">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
      <td mat-cell *matCellDef="let row"> {{row.name}} </td>
    </ng-container>
    
    <ng-container matColumnDef="totalQuantity">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Quantity </th>
      <td mat-cell *matCellDef="let row"> {{row.totalQuantity}} </td>
    </ng-container>

    <ng-container matColumnDef="purchaseCost">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Purchase Cost </th>
      <td mat-cell *matCellDef="let row"> {{row.purchaseCost | currency}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="action-column"> Actions </th>
      <td mat-cell *matCellDef="let row" class="action-column">
        <button mat-icon-button color="primary" type="button" (click)="openEditDialog(row)" *hasPermission="permissions.Components.Update" matTooltip="Edit" aria-label="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" type="button" (click)="deleteComponentItem(row)" *hasPermission="permissions.Components.Delete" matTooltip="Delete" aria-label="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell text-center py-4" [attr.colspan]="displayedColumns.length">
        No components found.
      </td>
    </tr>
  </table>

  <mat-paginator
    [length]="totalCount()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[5, 10, 25, 100]"
    (page)="onPageChange($event)"
    aria-label="Select page">
  </mat-paginator>
</div>
