<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <mat-toolbar>Tracer IAM</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      
      <!-- Example of using the hasPermission directive -->
      <a mat-list-item routerLink="/assets" routerLinkActive="active" *hasPermission="'Assets.Read'">
        <mat-icon matListItemIcon>devices</mat-icon>
        <span matListItemTitle>Assets</span>
      </a>

      <a mat-list-item routerLink="/master-data" routerLinkActive="active" *hasPermission="'MasterData.Read'">
        <mat-icon matListItemIcon>category</mat-icon>
        <span matListItemTitle>Master Data</span>
      </a>

      <a mat-list-item routerLink="/inventory/consumables" routerLinkActive="active" *hasPermission="'CONSUMABLES.VIEW'">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Consumables</span>
      </a>

      <a mat-list-item routerLink="/inventory/components" routerLinkActive="active" *hasPermission="'Components.Manage'">
        <mat-icon matListItemIcon>memory</mat-icon>
        <span matListItemTitle>Components</span>
      </a>

      <a mat-list-item routerLink="/inventory/accessories" routerLinkActive="active" *hasPermission="'Accessories.Manage'">
        <mat-icon matListItemIcon>headset</mat-icon>
        <span matListItemTitle>Accessories</span>
      </a>

      <a mat-list-item routerLink="/inventory/licenses" routerLinkActive="active" *hasPermission="'LICENSES.VIEW'">
        <mat-icon matListItemIcon>vpn_key</mat-icon>
        <span matListItemTitle>Licenses</span>
      </a>

      <a mat-list-item routerLink="/financials/depreciation" routerLinkActive="active" *hasPermission="'DEPRECIATION.VIEW'">
        <mat-icon matListItemIcon>trending_down</mat-icon>
        <span matListItemTitle>Depreciation</span>
      </a>

      <a mat-list-item routerLink="/financials/reports" routerLinkActive="active" *hasPermission="'Reports.View'">
        <mat-icon matListItemIcon>assessment</mat-icon>
        <span matListItemTitle>Reports</span>
      </a>

      <a mat-list-item routerLink="/settings" routerLinkActive="active" *hasPermission="'Settings.View'">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>

      <a mat-list-item routerLink="/settings/custom-fields" routerLinkActive="active" *hasPermission="'CustomFields.View'">
        <mat-icon matListItemIcon>text_fields</mat-icon>
        <span matListItemTitle>Custom Fields</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="spacer"></span>
      <app-alerts></app-alerts>
      <button mat-button (click)="logout()">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </mat-toolbar>

    <main class="content-wrapper">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
