<div class="list-container">
  <div class="header-container">
    <h1>Custom Fields</h1>
    <button mat-raised-button color="primary" (click)="openCreateDialog()" *hasPermission="permissions.CustomFields.Manage">
      <mat-icon>add</mat-icon>
      Add Custom Field
    </button>
  </div>

  <div class="table-container mat-elevation-z1">
    @if (loading()) {
      <div class="loading-shade">
        <mat-spinner></mat-spinner>
      </div>
    }

    <table mat-table [dataSource]="dataSource()">
      
      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <!-- Type Column -->
      <ng-container matColumnDef="fieldType">
        <th mat-header-cell *matHeaderCellDef> Type </th>
        <td mat-cell *matCellDef="let element"> {{element.fieldType}} </td>
      </ng-container>

      <!-- Required Column -->
      <ng-container matColumnDef="isRequired">
        <th mat-header-cell *matHeaderCellDef> Required </th>
        <td mat-cell *matCellDef="let element"> 
          <mat-icon [color]="element.isRequired ? 'primary' : ''">
            {{element.isRequired ? 'check_circle' : 'cancel'}}
          </mat-icon>
        </td>
      </ng-container>

      <!-- Options Column -->
      <ng-container matColumnDef="options">
        <th mat-header-cell *matHeaderCellDef> Options </th>
        <td mat-cell *matCellDef="let element"> 
          <span class="truncate-text" [matTooltip]="element.options">
            {{element.options || '-'}}
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let element" class="actions-cell">
          <button mat-icon-button color="primary" (click)="openEditDialog(element)" *hasPermission="permissions.CustomFields.Manage" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteField(element)" *hasPermission="permissions.CustomFields.Manage" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-state" [attr.colspan]="displayedColumns.length">
          No custom fields found.
        </td>
      </tr>
    </table>
  </div>
</div>
