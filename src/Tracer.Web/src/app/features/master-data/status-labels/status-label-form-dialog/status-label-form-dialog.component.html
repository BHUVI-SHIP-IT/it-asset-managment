<h2 mat-dialog-title>{{ isEditMode ? 'Edit Status Label' : 'New Status Label' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="dialog-form">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" placeholder="e.g., Deployed">
      @if (form.get('name')?.hasError('required')) {
        <mat-error>Name is required</mat-error>
      }
      @if (form.get('name')?.hasError('maxlength')) {
        <mat-error>Name cannot exceed 50 characters</mat-error>
      }
    </mat-form-field>

    <mat-checkbox formControlName="isDeployable">Deployable</mat-checkbox>
    <mat-checkbox formControlName="isPending">Pending</mat-checkbox>
    <mat-checkbox formControlName="isArchived">Archived</mat-checkbox>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="onSubmit()">
    {{ isEditMode ? 'Update' : 'Create' }}
  </button>
</mat-dialog-actions>
